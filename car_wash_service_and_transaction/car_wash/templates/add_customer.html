{% extends "master.html" %}
{% block title %}Add Customer{% endblock %}
{% block page_title %}Add Customer{% endblock %}

{% block content %}
<div style="max-width:560px">
  <div class="breadcrumb"><a href="{% url 'customer_list' %}">Customers</a> / Add</div>
  <div class="card" style="margin-top:12px">
    <form method="post">{% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label>First Name *</label>
          <input name="first_name" value="{{ post.first_name|default:'' }}" required>
        </div>
        <div class="form-group">
          <label>Middle Name</label>
          <input name="middle_name" value="{{ post.middle_name|default:'' }}">
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input name="last_name" value="{{ post.last_name|default:'' }}" required>
        </div>
        <div class="form-group">
          <label>Contact Number</label>
          <input name="contact_number" value="{{ post.contact_number|default:'' }}">
        </div>
        <div class="form-group col-span-2">
          <label>Address</label>
          <input name="address" value="{{ post.address|default:'' }}">
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-primary">Save Customer</button>
        <a href="{% url 'customer_list' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
