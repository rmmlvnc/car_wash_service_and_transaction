{% extends "master.html" %}
{% block title %}New Service{% endblock %}
{% block page_title %}New Service{% endblock %}
{% block content %}
<div style="max-width:560px">
  <div class="breadcrumb"><a href="{% url 'service_list' %}">Services</a> / New</div>
  <div class="card" style="margin-top:12px">
    <form method="post">{% csrf_token %}
      <div class="form-grid">
        <div class="form-group"><label>Service Name *</label><input name="service_name" value="{{ post.service_name|default:'' }}" required></div>
        <div class="form-group"><label>Service Type *</label><input name="service_type" value="{{ post.service_type|default:'' }}" placeholder="e.g. Exterior, Interior" required></div>
        <div class="form-group"><label>Price (₱) *</label><input name="price" type="number" step="0.01" min="0" value="{{ post.price|default:'' }}" required></div>
        <div class="form-group"><label>Duration (minutes)</label><input name="duration_minutes" type="number" min="1" value="{{ post.duration_minutes|default:'30' }}"></div>
        <div class="form-group col-span-2"><label>Description</label><textarea name="description">{{ post.description|default:'' }}</textarea></div>
        <div class="form-group col-span-2">
          <label style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" name="is_package" style="width:auto">
            Mark as a Package Deal
          </label>
          <div style="font-size:.75rem;color:var(--muted);margin-top:4px">Package services will be displayed separately in the customer portal.</div>
        </div>
      </div>
      <div style="display:flex;gap:10px;margin-top:8px">
        <button class="btn btn-primary">Create Service</button>
        <a href="{% url 'service_list' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
