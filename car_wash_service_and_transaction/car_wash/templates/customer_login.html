{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — SparkWash</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{% static 'styles.css' %}">
</head>
<body style="display:block">
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="name">✦ SparkWash</div>
      <small>Customer Portal</small>
    </div>

    {% if messages %}
      {% for m in messages %}
      <div class="alert alert-error" style="margin-bottom:16px">{{ m }}</div>
      {% endfor %}
    {% endif %}

    <div class="auth-title">Welcome back</div>
    <form method="post">{% csrf_token %}
      <div class="form-group"><label>Username</label><input name="username" value="{{ post.username|default:'' }}" autofocus required></div>
      <div class="form-group"><label>Password</label><input name="password" type="password" required></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px">Login</button>
    </form>
    <div class="auth-footer">
      Don't have an account? <a href="{% url 'portal_register' %}">Register here</a>
    </div>
  </div>
</div>
</body>
</html>
